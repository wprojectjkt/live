<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WProject Live</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body oncontextmenu="return false">
  <div class="live-wrapper animate-fade">
    <!-- Avatar kiri atas -->
    <div class="top-bar">
      <img src="assets/avatar.png" alt="Avatar" class="avatar" />
      <button class="btn-control" onclick="logout()">⏻ Logout</button>
    </div>

    <!-- Video player -->
    <video id="video" class="live-video" playsinline controls></video>

    <!-- Preloader -->
    <div id="preloader" class="preloader">
      <div class="loader"></div>
      <p class="loading-text">Menunggu live dimulai...</p>
    </div>
  </div>

  <script src="assets/app.js"></script>
  <script>
    // Anti DevTools
    document.addEventListener("keydown", function(e) {
      if (
        e.keyCode === 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
        (e.ctrlKey && e.keyCode === 85)
      ) {
        e.preventDefault();
        return false;
      }
    });
  </script>
</body>
</html>
