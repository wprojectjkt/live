<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WProject Stream</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div class="container">
    <!-- Player Section -->
    <div class="player-section">
      <div class="video-wrapper">
        <video id="videoPlayer" controls></video>
      </div>
      <div class="stream-info">
        <img src="logo.png" alt="Streamer" class="avatar">
        <div>
          <h3>WProject Live</h3>
          <p>Streaming now • <span id="viewerCount">0</span> penonton</p>
        </div>
        <button onclick="logout()" class="logout-btn">Logout</button>
      </div>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">
      <h3>Stream Chat</h3>
      <div class="chat-box" id="chatBox">
        <p>Selamat datang di WProject Live 🎉</p>
      </div>
      <div class="chat-input">
        <input type="text" placeholder="Ketik pesan..." id="chatInput">
        <button onclick="sendMessage()">Kirim</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
