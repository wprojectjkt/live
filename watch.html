<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>WProject Live</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/player.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <header>
    <div class="logo">WProject Live</div>
    <button onclick="logout()">Logout</button>
  </header>

  <main>
    <section class="player">
      <video id="videoPlayer" controls></video>
      <div class="info-bar">
        <img src="img/logo.png" alt="Streamer">
        <div>
          <strong>WProject Streaming</strong>
          <span id="viewerCount">0 penonton</span>
        </div>
      </div>
    </section>

    <aside class="sidebar">
      <h3>Stream Info</h3>
      <p>Selamat datang di live 🚀</p>
    </aside>
  </main>

  <script src="js/player.js"></script>
  <script src="js/ui.js"></script>
</body>
