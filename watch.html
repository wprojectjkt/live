<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming - WProject</title>
  <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body oncontextmenu="return false;">
  <div class="player-wrapper">
    <video id="video" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    <div class="watermark">www.wproject.web.id</div>
    <div id="status" class="status"></div>
    <button class="logout" onclick="logoutToken()">Logout</button>
  </div>

  <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-http-source-selector@1.1.7/dist/videojs-http-source-selector.min.js"></script>
  <script src="assets/app.js"></script>
  <script>
    initWatch();
    document.addEventListener("keydown", e => {
      if (e.key === "F12" || (e.ctrlKey && e.shiftKey && ["I","C","J"].includes(e.key))) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
