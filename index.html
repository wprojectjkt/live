<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WProject Live</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script defer src="player.js"></script>
  <script defer src="counter.js"></script>
  <script defer src="chat.js"></script>
  <style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-200px) scale(1.5); }
}
.animate-fade-in { animation: fadeIn 0.3s ease-out; }
.animate-float-up { animation: floatUp 2s ease-out forwards; }
</style>
</head>
<body class="bg-gray-900 flex flex-col h-screen text-white">

  <!-- Popup Token -->
  <div id="popup" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden">
    <div class="bg-gray-800 p-6 rounded-lg shadow-xl text-center max-w-sm w-full">
      <h2 class="text-lg font-bold mb-4">🔑 Verifikasi Token</h2>
      <p id="popupMessage" class="mb-4">Memeriksa token...</p>
      <button id="popupClose" class="bg-blue-500 px-4 py-2 rounded">OK</button>
    </div>
  </div>

  <!-- Header -->
  <header class="p-3 bg-gray-800 text-center text-lg font-bold shadow-md">
    🎥 WProject Live Showroom
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col md:flex-row relative">

    <!-- Video Section -->
    <div class="relative flex-1 flex items-center justify-center bg-black">
      <video id="video" class="w-full h-full object-contain bg-black" controls autoplay></video>
      
      <!-- Gradient Overlay -->
      <div class="absolute bottom-0 left-0 w-full h-20 bg-gradient-to-t from-black to-transparent flex items-end justify-between px-4 py-2">
        <!-- Buttons -->
        <div class="flex space-x-2">
          <button class="px-3 py-1 bg-red-500 rounded-full text-sm hover:bg-red-600">❤️ Follow</button>
          <button class="px-3 py-1 bg-blue-500 rounded-full text-sm hover:bg-blue-600">🔗 Share</button>
        </div>
        <!-- Status -->
        <p id="status" class="text-xs text-gray-300">Checking stream...</p>
      </div>

      <!-- Counter overlay -->
      <div class="absolute top-4 left-4 bg-gray-800 bg-opacity-70 px-3 py-1 rounded-full text-sm">
        👥 <span id="viewerCount">0</span> penonton
      </div>

      <!-- Gift Animation Overlay -->
      <div id="giftOverlay" class="absolute bottom-24 left-4 space-y-2"></div>
    </div>

    <!-- Chat Section -->
    <aside class="w-full md:w-1/3 bg-gray-800 flex flex-col border-l border-gray-700 h-[40vh] md:h-auto">
      <!-- Pinned Message -->
      <div id="pinned" class="bg-yellow-500 text-black text-sm p-2 font-bold hidden"></div>

      <!-- Chat Box -->
      <div id="chatBox" class="flex-1 p-2 overflow-y-auto space-y-2"></div>

      <!-- Chat Input -->
      <div class="p-2 flex border-t border-gray-700">
        <input id="chatInput" type="text" placeholder="Tulis pesan..." 
          class="flex-1 p-2 rounded-l bg-gray-700 text-white focus:outline-none">
        <button id="sendBtn" class="px-4 bg-blue-500 rounded-r hover:bg-blue-600">Kirim</button>
      </div>

      <!-- Quick Gift -->
      <div class="p-2 flex space-x-2 border-t border-gray-700">
        <button class="giftBtn px-3 py-1 bg-pink-500 rounded-full">🌹</button>
        <button class="giftBtn px-3 py-1 bg-purple-500 rounded-full">🎁</button>
        <button class="giftBtn px-3 py-1 bg-yellow-500 rounded-full">⭐</button>
      </div>
    </aside>
  </main>

</body>
</html>
