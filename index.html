<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Masuk Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <h1>🔑 Masukkan Token</h1>
    <input id="tokenInput" type="text" placeholder="Tempel token Anda di sini" autocomplete="off">
    <div class="buttons">
      <button onclick="validateToken()">Masuk</button>
      <button onclick="pasteToken()">📋 Paste</button>
    </div>
    <p id="status"></p>
  </div>
  <script src="index.js"></script>
</body>
</html>
