<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WProject Live</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script defer src="player.js"></script>
  <script defer src="counter.js"></script>
  <script defer src="chat.js"></script>
</head>
<body class="bg-gray-900 flex flex-col h-screen text-white">

  <!-- Popup Token -->
  <div id="popup" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden">
    <div class="bg-gray-800 p-6 rounded-lg shadow-xl text-center max-w-sm w-full">
      <h2 class="text-lg font-bold mb-4">🔑 Verifikasi Token</h2>
      <p id="popupMessage" class="mb-4">Memeriksa token...</p>
      <button id="popupClose" class="bg-blue-500 px-4 py-2 rounded">OK</button>
    </div>
  </div>

  <!-- Header -->
  <header class="p-3 bg-gray-800 text-center text-lg font-bold shadow-md">
    🎥 WProject Live Showroom
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col md:flex-row">
    
    <!-- Video Section -->
    <div class="relative flex-1 flex items-center justify-center bg-black">
      <video id="video" class="w-full h-full object-contain bg-black" controls autoplay></video>
      
      <!-- Counter overlay -->
      <div class="absolute top-4 left-4 bg-gray-800 bg-opacity-70 px-3 py-1 rounded-full text-sm">
        👥 <span id="viewerCount">0</span> penonton
      </div>

      <p id="status" class="absolute bottom-2 left-1/2 transform -translate-x-1/2 text-xs text-gray-300">
        Checking stream...
      </p>
    </div>

    <!-- Chat Section -->
    <aside class="w-full md:w-1/3 bg-gray-800 flex flex-col border-l border-gray-700 h-[40vh] md:h-auto">
      <div id="chatBox" class="flex-1 p-2 overflow-y-auto space-y-2"></div>
      <div class="p-2 flex border-t border-gray-700">
        <input id="chatInput" type="text" placeholder="Tulis pesan..." 
          class="flex-1 p-2 rounded-l bg-gray-700 text-white focus:outline-none">
        <button id="sendBtn" class="px-4 bg-blue-500 rounded-r hover:bg-blue-600">Kirim</button>
      </div>
    </aside>
  </main>

</body>
</html>
