<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WProject Live Stream</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="popup">
      <h2>🔑 Masukkan Token Akses</h2>
      <input type="text" id="tokenInput" placeholder="Paste token link di sini">
      <button onclick="validateToken()">✅ Submit</button>
      <p id="status"></p>
    </div>
  </div>

  <div id="playerContainer" class="hidden">
    <video id="video" controls autoplay></video>
    <div id="viewerCount">👥 0 penonton</div>
    <div id="chatBox">
      <div id="messages"></div>
      <input type="text" id="chatInput" placeholder="Ketik pesan...">
      <button onclick="sendMessage()">Kirim</button>
    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
