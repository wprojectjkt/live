<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WProject Live</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script defer src="player.js"></script>
  <script defer src="counter.js"></script>
  <script defer src="chat.js"></script>
</head>
<body class="bg-gray-900 flex flex-col h-screen text-white">
  <!-- Popup Token -->
  <div id="popup" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden">
    <div class="bg-gray-800 p-6 rounded-lg shadow-xl text-center">
      <h2 class="text-lg font-bold mb-4">🔑 Verifikasi Token</h2>
      <p id="popupMessage" class="mb-4">Memeriksa token...</p>
      <button id="popupClose" class="bg-blue-500 px-4 py-2 rounded">OK</button>
    </div>
  </div>

  <!-- Header -->
  <header class="p-4 bg-gray-800 text-center text-xl font-bold">
    🎥 WProject Live
  </header>

  <main class="flex-1 flex flex-col md:flex-row">
    <!-- Video Section -->
    <div class="flex-1 flex flex-col items-center p-4">
      <video id="video" class="w-full max-w-4xl rounded-lg shadow-lg bg-black" controls autoplay></video>
      <p id="status" class="mt-2 text-sm text-gray-400">Checking stream...</p>
      <p id="viewerCount" class="mt-1 text-green-400">👥 Penonton: 0</p>
    </div>

    <!-- Chat Section -->
    <aside class="w-full md:w-1/3 bg-gray-800 flex flex-col">
      <div id="chatBox" class="flex-1 p-2 overflow-y-auto"></div>
      <div class="p-2 flex">
        <input id="chatInput" type="text" placeholder="Tulis pesan..." class="flex-1 p-2 rounded-l bg-gray-700 text-white">
        <button id="sendBtn" class="px-4 bg-blue-500 rounded-r">Kirim</button>
      </div>
    </aside>
  </main>
</body>
</html>
